org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.newDsl=false
android.builtInKotlin=false
# Disable parallel Kotlin compilation — fixes incremental cache file-lock
# crashes on Windows when the build directory is on a non-system drive (M:)
org.gradle.parallel=false
kotlin.incremental=false
